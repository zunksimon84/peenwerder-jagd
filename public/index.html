<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#b5d33a" />
    <title>PREYE 👁 Peenwerder Jagd</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anta&display=swap" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="gate" hidden>
      <div class="gate-card">
        <div class="gate-brand">
          <span class="brand-pray">PREYE</span>
          <svg class="brand-eye" viewBox="0 0 24 14" aria-hidden="true">
            <ellipse cx="12" cy="7" rx="10" ry="6" stroke="currentColor" fill="none" stroke-width="1.4" />
            <circle cx="12" cy="7" r="2.8" fill="currentColor" />
          </svg>
        </div>
        <p class="gate-sub">Privater Zugang</p>
        <form id="gate-form" autocomplete="on">
          <input id="gate-pw" type="password" autocomplete="current-password"
                 placeholder="Passwort" required />
          <button type="submit">Öffnen</button>
        </form>
        <p id="gate-error" class="gate-error" hidden></p>
      </div>
    </div>

    <header id="topbar">
      <h1>
        <span class="brand-pray">PREYE</span>
        <svg class="brand-eye" viewBox="0 0 24 14" aria-hidden="true">
          <ellipse cx="12" cy="7" rx="10" ry="6" stroke="currentColor" fill="none" stroke-width="1.4" />
          <circle cx="12" cy="7" r="2.8" fill="currentColor" />
        </svg>
        <span class="brand-place">Peenwerder Jagd</span>
      </h1>
      <div class="filters">
        <select id="filter-species" aria-label="Wildart filtern">
          <option value="">Alle Wildarten</option>
        </select>
        <select id="filter-range" aria-label="Zeitraum">
          <option value="all">Gesamt</option>
          <option value="season" selected>Diese Saison</option>
          <option value="30d">30 Tage</option>
          <option value="7d">7 Tage</option>
          <option value="today">Heute</option>
          <option value="custom">Datum…</option>
        </select>
        <input id="filter-date" type="date" hidden aria-label="Datum auswählen" />
        <button id="strecke-btn" class="filter-btn" type="button">Strecke</button>
      </div>
    </header>

    <div id="map" role="application" aria-label="Karte mit Hochsitzen und Heatmap"></div>

    <button id="fab" aria-label="Strecke eintragen">+</button>

    <aside id="leaderboard" hidden>
      <strong>Top 5</strong>
      <ol id="leaderboard-list"></ol>
    </aside>

    <div id="sheet-backdrop" hidden></div>
    <section id="sheet" hidden aria-modal="true" role="dialog" aria-labelledby="sheet-title">
      <header>
        <h2 id="sheet-title">Strecke eintragen</h2>
        <button id="sheet-close" aria-label="Schließen">×</button>
      </header>
      <form id="harvest-form">
        <div class="mode-toggle" role="tablist" aria-label="Standortart">
          <button type="button" class="mode-btn active" data-mode="post" role="tab" aria-selected="true">Kanzel</button>
          <button type="button" class="mode-btn" data-mode="klettersitz" role="tab" aria-selected="false">Klettersitz</button>
          <button type="button" class="mode-btn" data-mode="pirsch" role="tab" aria-selected="false">Pirsch</button>
        </div>
        <label data-mode-show="post">
          Kanzel
          <select id="f-post"></select>
        </label>
        <label data-mode-show="coords">
          Bezeichnung <span class="muted">(optional)</span>
          <input id="f-free-label" type="text" maxlength="40" autocomplete="off"
                 placeholder="z.B. Eichenwiese-Süd" />
        </label>
        <div class="row" data-mode-show="coords">
          <label>
            Breitengrad
            <input id="f-free-lat" type="number" step="0.000001" inputmode="decimal" />
          </label>
          <label>
            Längengrad
            <input id="f-free-lng" type="number" step="0.000001" inputmode="decimal" />
          </label>
        </div>
        <button type="button" id="f-free-here" class="ghost" data-mode-show="coords">
          Aktuelle Position
        </button>
        <label>
          Jäger
          <select id="f-hunter" required></select>
        </label>
        <label>
          Wildart
          <select id="f-species" required></select>
        </label>
        <div class="species-extras">
          <div class="gender-buttons" role="group" aria-label="Geschlecht">
            <button type="button" class="gender-btn" data-gender="m" aria-label="Männlich">♂</button>
            <button type="button" class="gender-btn" data-gender="w" aria-label="Weiblich">♀</button>
          </div>
          <label class="ak-select">
            Altersklasse <span class="muted">(optional)</span>
            <select id="f-age">
              <option value="">— keine Angabe</option>
              <option value="0">AK 0</option>
              <option value="1">AK 1</option>
              <option value="2">AK 2</option>
              <option value="3">AK 3</option>
              <option value="4">AK 4</option>
            </select>
          </label>
        </div>
        <label>
          Anzahl
          <div class="counter">
            <button type="button" data-step="-1" aria-label="Weniger">−</button>
            <input id="f-count" type="number" min="1" max="20" value="1" inputmode="numeric" required />
            <button type="button" data-step="1" aria-label="Mehr">+</button>
          </div>
        </label>
        <label>
          Datum & Uhrzeit
          <input id="f-time" type="datetime-local" step="60" />
        </label>
        <label>
          Notiz <span class="muted">(optional)</span>
          <textarea id="f-notes" rows="2" maxlength="200"></textarea>
        </label>
        <button type="submit" id="f-submit">Eintragen</button>
        <button type="button" id="f-cancel" class="cancel-btn">Abbrechen</button>
      </form>
      <aside id="history" hidden>
        <h3>Bisherige Strecke</h3>
        <ul id="history-list"></ul>
      </aside>
    </section>

    <div id="strecke-backdrop" hidden></div>
    <section id="strecke-modal" hidden aria-modal="true" role="dialog" aria-labelledby="strecke-title">
      <header>
        <h2 id="strecke-title">Strecke</h2>
        <button id="strecke-close" aria-label="Schließen">×</button>
      </header>
      <div class="strecke-range muted" id="strecke-range"></div>
      <div class="strecke-total">
        <div class="big-number" id="strecke-total">—</div>
        <div class="muted">Stück gesamt</div>
      </div>
      <ul id="strecke-list"></ul>
      <div class="timeline" id="strecke-timeline" hidden>
        <h3>Saison-Verlauf</h3>
        <svg id="timeline-svg" viewBox="0 0 320 60" preserveAspectRatio="none" aria-hidden="true"></svg>
        <div class="timeline-axis">
          <span>1. Apr</span>
          <span id="timeline-today" class="muted"></span>
          <span>31. Mär</span>
        </div>
      </div>
      <button type="button" id="strecke-close-bottom" class="cancel-btn">Schließen</button>
    </section>

    <div id="toast" hidden></div>

    <script src="config.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
