<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f3a1f" />
    <title>Peenwerder Jagd-Heatmap</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header id="topbar">
      <h1>Peenwerder Jagd</h1>
      <div class="filters">
        <select id="filter-species" aria-label="Wildart filtern">
          <option value="">Alle Wildarten</option>
        </select>
        <select id="filter-range" aria-label="Zeitraum">
          <option value="all">Gesamt</option>
          <option value="season" selected>Diese Saison</option>
          <option value="30d">30 Tage</option>
          <option value="7d">7 Tage</option>
        </select>
      </div>
    </header>

    <div id="map" role="application" aria-label="Karte mit Hochsitzen und Heatmap"></div>

    <button id="fab" aria-label="Strecke eintragen">+</button>

    <aside id="leaderboard" hidden>
      <strong>Top 5</strong>
      <ol id="leaderboard-list"></ol>
    </aside>

    <div id="sheet-backdrop" hidden></div>
    <section id="sheet" hidden aria-modal="true" role="dialog" aria-labelledby="sheet-title">
      <header>
        <h2 id="sheet-title">Strecke eintragen</h2>
        <button id="sheet-close" aria-label="Schließen">×</button>
      </header>
      <form id="harvest-form">
        <div class="mode-toggle" role="tablist" aria-label="Standortart">
          <button type="button" class="mode-btn active" data-mode="post" role="tab" aria-selected="true">Kanzel</button>
          <button type="button" class="mode-btn" data-mode="free" role="tab" aria-selected="false">Klettersitz</button>
        </div>
        <label data-mode-show="post">
          Kanzel
          <select id="f-post"></select>
          <button type="button" id="f-nearest" class="ghost">Nächste verwenden</button>
        </label>
        <label data-mode-show="free">
          Bezeichnung <span class="muted">(optional)</span>
          <input id="f-free-label" type="text" maxlength="40" autocomplete="off"
                 placeholder="z.B. Eichenwiese-Süd" />
        </label>
        <div class="row" data-mode-show="free">
          <label>
            Breitengrad
            <input id="f-free-lat" type="number" step="0.000001" inputmode="decimal" />
          </label>
          <label>
            Längengrad
            <input id="f-free-lng" type="number" step="0.000001" inputmode="decimal" />
          </label>
        </div>
        <button type="button" id="f-free-here" class="ghost" data-mode-show="free">
          Aktuelle Position
        </button>
        <label>
          Jäger
          <select id="f-hunter" required></select>
        </label>
        <label>
          Wildart
          <select id="f-species" required></select>
        </label>
        <label>
          Anzahl
          <div class="counter">
            <button type="button" data-step="-1" aria-label="Weniger">−</button>
            <input id="f-count" type="number" min="1" max="20" value="1" inputmode="numeric" required />
            <button type="button" data-step="1" aria-label="Mehr">+</button>
          </div>
        </label>
        <label>
          Notiz <span class="muted">(optional)</span>
          <textarea id="f-notes" rows="2" maxlength="200"></textarea>
        </label>
        <button type="submit" id="f-submit">Eintragen</button>
      </form>
    </section>

    <div id="toast" hidden></div>

    <script src="config.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
