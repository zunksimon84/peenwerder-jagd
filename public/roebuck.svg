<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" fill="#0e0e0e">
  <!-- Roebuck (Rehbock), side view, facing left -->

  <!-- Antlers — small forked beams typical for a roebuck -->
  <g fill="none" stroke="#0e0e0e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M68 52 L 60 22 L 64 6 L 67 20 M 60 22 L 50 9 L 52 4"/>
    <path d="M65 34 L 76 20"/>
    <path d="M88 52 L 96 22 L 92 6 L 89 20 M 96 22 L 106 9 L 104 4"/>
    <path d="M91 34 L 80 20"/>
  </g>

  <!-- Skull cap connecting the antlers -->
  <ellipse cx="78" cy="55" rx="13" ry="5"/>

  <!-- Ear -->
  <path d="M64 62 Q 52 40 56 30 Q 64 40 71 60 Z"/>

  <!-- Head -->
  <path d="M52 80
           C 36 78 28 90 32 102
           C 36 112 46 115 58 112
           L 96 108
           C 108 104 114 92 106 82
           C 98 72 80 72 65 76
           Z"/>

  <!-- Snout / muzzle tip -->
  <ellipse cx="35" cy="100" rx="5" ry="3.5"/>

  <!-- Neck -->
  <path d="M100 110
           Q 120 130 135 158
           L 122 168
           Q 104 145 94 116 Z"/>

  <!-- Body -->
  <path d="M120 170
           Q 165 154 225 160
           Q 280 167 305 184
           L 310 200
           Q 308 218 295 222
           L 145 222
           Q 130 217 122 202 Z"/>

  <!-- Short tail -->
  <path d="M119 180 L 106 174 L 111 192 Z"/>

  <!-- Hind legs -->
  <path d="M147 222 L 144 290 L 156 290 L 159 222 Z"/>
  <path d="M172 222 L 169 290 L 181 290 L 184 222 Z"/>

  <!-- Front legs -->
  <path d="M252 222 L 249 290 L 261 290 L 264 222 Z"/>
  <path d="M277 222 L 274 290 L 286 290 L 289 222 Z"/>
</svg>
