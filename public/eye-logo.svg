<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 130">
  <!-- Eye outline — fuller, more compact almond (≈1.6:1 width:height).
       Control points sit outside the viewBox; the curve itself stays
       inside. -->
  <path fill="currentColor" fill-rule="evenodd" d="
    M 6 65
    Q 80 -27 154 65
    Q 80 157 6 65 Z
    M 24 65
    Q 80 13 136 65
    Q 80 117 24 65 Z
  "/>
  <!-- Iris ring (hollow circle) -->
  <circle cx="80" cy="65" r="34" fill="none" stroke="currentColor" stroke-width="6.5"/>
  <!-- Bullet — small, centred inside the iris -->
  <g fill="currentColor">
    <!-- Cartridge body -->
    <rect x="72" y="61.5" width="14" height="7"/>
    <!-- Cartridge rim flange (two-step) -->
    <rect x="69.5" y="59.5" width="2" height="11"/>
    <rect x="67" y="60.5" width="2" height="9"/>
    <!-- Projectile (rounded conical tip on the right) -->
    <path d="M 86 61 L 90 61 Q 93.5 65 90 69 L 86 69 Z"/>
  </g>
</svg>
