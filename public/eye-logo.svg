<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 120">
  <!-- Eye outline (almond/lemon shape, hollow ring via even-odd) -->
  <path fill="currentColor" fill-rule="evenodd" d="
    M 4 60
    Q 110 -8 216 60
    Q 110 128 4 60 Z
    M 22 60
    Q 110 18 198 60
    Q 110 102 22 60 Z
  "/>
  <!-- Iris ring (hollow circle, thinner stroke than the eye outline) -->
  <circle cx="110" cy="60" r="32" fill="none" stroke="currentColor" stroke-width="6"/>
  <!-- Bullet — small enough to sit comfortably inside the iris -->
  <g fill="currentColor">
    <!-- Cartridge body -->
    <rect x="100" y="57" width="14" height="6"/>
    <!-- Cartridge rim flange (two-step) -->
    <rect x="97.5" y="55.5" width="2" height="9"/>
    <rect x="95" y="56.5" width="2" height="7"/>
    <!-- Projectile (rounded conical tip on the right) -->
    <path d="M 114 56.5 L 118 56.5 Q 122 60 118 63.5 L 114 63.5 Z"/>
  </g>
</svg>
