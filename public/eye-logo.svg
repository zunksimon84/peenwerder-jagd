<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 140">
  <!-- Eye outline — more compact almond (≈1.7:1), hollow ring. Control
       points sit outside the viewBox; the curve itself stays inside. -->
  <path fill="currentColor" fill-rule="evenodd" d="
    M 10 70 Q 110 -46 210 70 Q 110 186 10 70 Z
    M 28 70 Q 110 -10 192 70 Q 110 150 28 70 Z
  "/>
  <!-- Iris ring -->
  <circle cx="110" cy="70" r="42" fill="none" stroke="currentColor" stroke-width="8"/>
  <!-- Bullet (rifle cartridge + projectile), slightly smaller than the iris -->
  <g fill="currentColor">
    <!-- Rim flange (extractor groove) -->
    <rect x="75" y="62" width="3" height="16"/>
    <!-- Cartridge head / rim -->
    <rect x="78" y="59.5" width="5" height="21"/>
    <!-- Cartridge case body -->
    <rect x="82" y="61" width="42" height="18"/>
    <!-- Shoulder / neck step-down -->
    <rect x="124" y="63" width="8" height="14"/>
    <!-- Bullet ogive (curving from the neck to a rounded point) -->
    <path d="M 132 63 L 140 63 C 147 63, 150 67, 150 70 C 150 73, 147 77, 140 77 L 132 77 Z"/>
  </g>
</svg>
